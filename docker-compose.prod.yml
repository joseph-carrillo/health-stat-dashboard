# Health Statistics Dashboard — production stack.
#
#   Build locally:   docker compose -f docker-compose.prod.yml up -d --build
#   Pull a release:  IMAGE_TAG=v1.0.0 docker compose -f docker-compose.prod.yml pull
#                    IMAGE_TAG=v1.0.0 docker compose -f docker-compose.prod.yml up -d
#
# Differences from dev:
#   - caddy terminates TLS on 80/443 (automatic Let's Encrypt when SITE_ADDRESS
#     is a real domain; plain HTTP when SITE_ADDRESS=:80) and proxies to nginx
#   - backend runs gunicorn (production target), no source bind-mount, no reload
#   - frontend is the built SPA served by nginx, proxying /api -> backend
#   - db-backup dumps the database nightly into ./backups (30-day retention)
#   - credentials/secrets come from .env (must set strong values for prod)

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-doh_admin}
      POSTGRES_DB: ${DB_NAME:-doh_nir_dashboard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-doh_admin} -d ${DB_NAME:-doh_nir_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-backup:
    # Nightly pg_dump with 30-day retention. Dumps land in ./backups on the
    # host — copy them off-server on a schedule (see RUNBOOK.md). postgres:15
    # is reused so pg_dump matches the server version exactly.
    image: postgres:15
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      # $$ is compose-escaping for a literal $ in the container shell.
      - |
        while true; do
          pg_dump -h db -U ${DB_USER:-doh_admin} -d ${DB_NAME:-doh_nir_dashboard} \
            | gzip > "/backups/doh_nir_$$(date +%F).sql.gz" \
            && echo "backup OK: doh_nir_$$(date +%F).sql.gz"
          find /backups -name '*.sql.gz' -mtime +30 -delete
          sleep 86400
        done

  backend:
    image: ghcr.io/joseph-carrillo/health-stat-dashboard-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # curl is installed in the base image for exactly this.
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    image: ghcr.io/joseph-carrillo/health-stat-dashboard-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    # Not published to the host — caddy is the only entry point.
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # busybox wget ships with nginx:alpine. 127.0.0.1, not localhost:
      # localhost resolves to ::1 first inside the container.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
