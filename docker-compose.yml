version: "3.8"

services:
  db:
    image: postgres:15
    container_name: doh_nir_db
    restart: always
    environment:
      POSTGRES_USER: doh_admin
      POSTGRES_PASSWORD: doh_password_2026
      POSTGRES_DB: doh_nir_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: