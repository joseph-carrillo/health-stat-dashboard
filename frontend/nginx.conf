# nginx config for the production frontend container.
# Serves the built SPA and reverse-proxies /api to the backend container.

server {
    listen 80;
    # IPv6 too — the stock image adds this via its entrypoint script only for
    # the untouched default.conf; we replace that file, so declare it ourselves
    # (the container-internal healthcheck's "localhost" resolves to ::1 first).
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. "always" keeps them on error responses too.
    # NOTE: nginx add_header inheritance — any location block that declares
    # its own add_header drops ALL inherited ones, so /assets/ repeats these.
    # HSTS is intentionally not set here: TLS terminates at the reverse proxy
    # (Caddy), which owns that header.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Static assets — long cache for hashed files.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # API calls go to the backend service (same compose network).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Excel uploads can be large; lift the default 1m cap.
        client_max_body_size 50m;
        proxy_read_timeout 120s;
    }

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
