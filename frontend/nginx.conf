# nginx config for the production frontend container.
# Serves the built SPA and reverse-proxies /api to the backend container.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache for hashed files.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API calls go to the backend service (same compose network).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Excel uploads can be large; lift the default 1m cap.
        client_max_body_size 50m;
        proxy_read_timeout 120s;
    }

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
